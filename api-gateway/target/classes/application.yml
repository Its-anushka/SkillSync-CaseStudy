server:
  port: 7070

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Example of how you can add global CORS configuration if required
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    preferIpAddress: true

springdoc:
  swagger-ui:
    urls:
      - {name: 'user-service', url: '/user-service/v3/api-docs'}
      - {name: 'group-service', url: '/group-service/v3/api-docs'}
      - {name: 'session-service', url: '/session-service/v3/api-docs'}
      - {name: 'skill-service', url: '/skill-service/v3/api-docs'}
      - {name: 'notification-service', url: '/notification-service/v3/api-docs'}
      - {name: 'review-service', url: '/review-service/v3/api-docs'}
      - {name: 'authentication-service', url: '/authentication-service/v3/api-docs'}
      - {name: 'mentor-service', url: '/mentor-service/v3/api-docs'}
    use-root-path: true
    path: /swagger-ui.html
